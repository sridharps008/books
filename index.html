<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced PDF Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 120px;
    overflow-y: auto;
    border-right: 1px solid #ccc;
    background: #fafafa;
}

.thumbnail {
    width: 100%;
    cursor: pointer;
    margin-bottom: 5px;
}

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.controls {
    padding: 10px;
    background: #f4f4f4;
    text-align: center;
}

canvas {
    margin: auto;
    max-width: 100%;
}

button, input, select {
    margin: 5px;
    padding: 6px;
}
</style>
</head>

<body>

<div class="sidebar" id="thumbnails"></div>

<div class="main">
    <div class="controls">
        <select id="pdfSelector">
            <option value="file1.pdf">The Alchemist</option>
            <option value="file2.pdf">Red Dragon</option>
            <option value="file3.pdf">The silence of the Lambs</option>
            <option value="file4.pdf">Hannibal</option>
            <option value="file5.pdf">Hannibal Rising</option>
            <option value="file6.pdf">Cujo</option>
            <option value="file7.pdf">The Girl Next Door</option>
            <option value="file8.pdf">A Story of Yesterday</option>
            <option value="file9.pdf">Problems in General Physics-IE Irodov</option>

            

        </select>

        <br>

        <button id="prev">Prev</button>
        <span>Page <span id="page_num"></span> / <span id="page_count"></span></span>
        <button id="next">Next</button>

        <br>

        <input type="number" id="page_input" placeholder="Go to page" min="1">
        <button id="go_page">Go</button>

        <button id="zoom_in">Zoom +</button>
        <button id="zoom_out">Zoom -</button>
    </div>

    <canvas id="pdf-render"></canvas>
</div>

<script>
const canvas = document.getElementById('pdf-render');
const ctx = canvas.getContext('2d');
const thumbnailsContainer = document.getElementById('thumbnails');

let pdfDoc = null,
    pageNum = 1,
    scale = 1.2,
    pageIsRendering = false,
    pageNumPending = null;

// Render page
function renderPage(num) {
    pageIsRendering = true;

    pdfDoc.getPage(num).then(page => {
        const viewport = page.getViewport({ scale });
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        page.render({
            canvasContext: ctx,
            viewport: viewport
        }).promise.then(() => {
            pageIsRendering = false;
            if (pageNumPending !== null) {
                renderPage(pageNumPending);
                pageNumPending = null;
            }
        });

        document.getElementById('page_num').textContent = num;
        document.getElementById('page_input').value = num;
    });
}

function queueRenderPage(num) {
    if (pageIsRendering) {
        pageNumPending = num;
    } else {
        renderPage(num);
    }
}

// Navigation
document.getElementById('prev').onclick = () => {
    if (pageNum <= 1) return;
    pageNum--;
    queueRenderPage(pageNum);
};

document.getElementById('next').onclick = () => {
    if (pageNum >= pdfDoc.numPages) return;
    pageNum++;
    queueRenderPage(pageNum);
};

// Go to page
document.getElementById('go_page').onclick = () => {
    let page = parseInt(document.getElementById('page_input').value);
    if (page >= 1 && page <= pdfDoc.numPages) {
        pageNum = page;
        queueRenderPage(pageNum);
    }
};

document.getElementById('page_input').addEventListener('keypress', e => {
    if (e.key === 'Enter') document.getElementById('go_page').click();
});

// Zoom
document.getElementById('zoom_in').onclick = () => {
    scale += 0.2;
    renderPage(pageNum);
};

document.getElementById('zoom_out').onclick = () => {
    if (scale <= 0.6) return;
    scale -= 0.2;
    renderPage(pageNum);
};

// Load PDF
function loadPDF(url) {
    thumbnailsContainer.innerHTML = "";

    pdfjsLib.getDocument({
        url: url,
        rangeChunkSize: 65536
    }).promise.then(pdf => {
        pdfDoc = pdf;
        document.getElementById('page_count').textContent = pdf.numPages;

        renderPage(pageNum);

        // Generate thumbnails
        for (let i = 1; i <= pdf.numPages; i++) {
            pdf.getPage(i).then(page => {
                const viewport = page.getViewport({ scale: 0.2 });

                let thumbCanvas = document.createElement('canvas');
                let thumbCtx = thumbCanvas.getContext('2d');

                thumbCanvas.width = viewport.width;
                thumbCanvas.height = viewport.height;

                page.render({
                    canvasContext: thumbCtx,
                    viewport: viewport
                });

                thumbCanvas.classList.add('thumbnail');

                thumbCanvas.onclick = () => {
                    pageNum = i;
                    renderPage(pageNum);
                };

                thumbnailsContainer.appendChild(thumbCanvas);
            });
        }
    });
}

// Switch PDF
document.getElementById('pdfSelector').onchange = (e) => {
    pageNum = 1;
    loadPDF(e.target.value);
};

// Initial load
loadPDF(document.getElementById('pdfSelector').value);
</script>

</body>
</html>
