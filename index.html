<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    background: #f4f6f9;
}

/* Loading Screen */
#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    font-size: 20px;
    font-weight: bold;
}

/* Sidebar */
.sidebar {
    width: 120px;
    overflow-y: auto;
    border-right: 1px solid #ccc;
    background: #fafafa;
    padding: 5px;
    transition: width 0.3s;
}

.sidebar.hidden {
    width: 0;
    padding: 0;
    overflow: hidden;
}

.thumbnail {
    width: 100%;
    cursor: pointer;
    margin-bottom: 8px;
    border: 1px solid #ddd;
}

/* Main */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Controls */
.controls {
    padding: 10px;
    background: #fff;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

button, input, select {
    margin: 5px;
    padding: 6px 10px;
}

canvas {
    margin: auto;
    max-width: 100%;
    border: 1px solid #ccc;
}
</style>
</head>

<body>

<div id="loader">Loading PDF...</div>

<div class="sidebar" id="sidebar"></div>

<div class="main">
    <div class="controls">
        <button id="toggleSidebar">☰ Thumbnails</button>

        <select id="pdfSelector">
            <option value="file1.pdf">The Alchemist</option>
            <option value="file2.pdf">Red Dragon</option>
            <option value="file3.pdf">The silence of the Lambs</option>
            <option value="file4.pdf">Hannibal</option>
            <option value="file5.pdf">Hannibal Rising</option>
            <option value="file6.pdf">Cujo</option>
            <option value="file7.pdf">The Girl Next Door</option>
            <option value="file8.pdf">A Story of Yesterday</option>
            <option value="file9.pdf">Problems in General Physics-IE Irodov</option>
        </select>

        <br>

        <input type="number" id="page_input" placeholder="Go to page">
        <button id="go_page">Go</button>

        <button id="zoom_in">Zoom +</button>
        <button id="zoom_out">Zoom -</button>
        <br>

        <button id="prev">Prev</button>
        Page <span id="page_num"></span> / <span id="page_count"></span>
        <button id="next">Next</button>
    </div>

    <canvas id="pdf-render"></canvas>
</div>

<script>
const canvas = document.getElementById('pdf-render');
const ctx = canvas.getContext('2d');
const sidebar = document.getElementById('sidebar');
const loader = document.getElementById('loader');

let pdfDoc = null,
    pageNum = 1,
    scale = 1.2,
    pageIsRendering = false,
    pageNumPending = null;

// Show loader
function showLoader() {
    loader.style.display = "flex";
}

// Hide loader
function hideLoader() {
    loader.style.display = "none";
}

// Render page
function renderPage(num) {
    pageIsRendering = true;

    pdfDoc.getPage(num).then(page => {
        const viewport = page.getViewport({ scale });

        canvas.height = viewport.height;
        canvas.width = viewport.width;

        page.render({
            canvasContext: ctx,
            viewport: viewport
        }).promise.then(() => {
            pageIsRendering = false;

            if (pageNumPending !== null) {
                renderPage(pageNumPending);
                pageNumPending = null;
            }
        });

        document.getElementById('page_num').textContent = num;
        document.getElementById('page_input').value = num;
    });
}

function queueRenderPage(num) {
    if (pageIsRendering) {
        pageNumPending = num;
    } else {
        renderPage(num);
    }
}

// Navigation
document.getElementById('prev').onclick = () => {
    if (pageNum <= 1) return;
    pageNum--;
    queueRenderPage(pageNum);
};

document.getElementById('next').onclick = () => {
    if (pageNum >= pdfDoc.numPages) return;
    pageNum++;
    queueRenderPage(pageNum);
};

// Go to page
document.getElementById('go_page').onclick = () => {
    const page = parseInt(document.getElementById('page_input').value);
    if (page >= 1 && page <= pdfDoc.numPages) {
        pageNum = page;
        queueRenderPage(pageNum);
    }
};

document.getElementById('page_input').addEventListener('keypress', e => {
    if (e.key === 'Enter') document.getElementById('go_page').click();
});

// Zoom
document.getElementById('zoom_in').onclick = () => {
    scale += 0.2;
    renderPage(pageNum);
};

document.getElementById('zoom_out').onclick = () => {
    if (scale <= 0.6) return;
    scale -= 0.2;
    renderPage(pageNum);
};

// Toggle sidebar
document.getElementById('toggleSidebar').onclick = () => {
    sidebar.classList.toggle('hidden');
};

// Load PDF
function loadPDF(url) {
    showLoader();
    sidebar.innerHTML = "";

    pdfjsLib.getDocument({
        url: url,
        rangeChunkSize: 65536
    }).promise.then(pdf => {
        pdfDoc = pdf;
        document.getElementById('page_count').textContent = pdf.numPages;

        renderPage(pageNum);

        // Generate thumbnails
        for (let i = 1; i <= pdf.numPages; i++) {
            pdf.getPage(i).then(page => {
                const viewport = page.getViewport({ scale: 0.2 });

                let thumb = document.createElement('canvas');
                let tctx = thumb.getContext('2d');

                thumb.width = viewport.width;
                thumb.height = viewport.height;

                page.render({ canvasContext: tctx, viewport });

                thumb.classList.add('thumbnail');

                thumb.onclick = () => {
                    pageNum = i;
                    renderPage(pageNum);
                };

                sidebar.appendChild(thumb);
            });
        }

        hideLoader(); // Hide after loading
    });
}

// Change PDF
document.getElementById('pdfSelector').onchange = (e) => {
    pageNum = 1;
    loadPDF(e.target.value);
};

// Initial load
loadPDF(document.getElementById('pdfSelector').value);
</script>

</body>
</html>
